name: Release

on:
  workflow_call:
    secrets:
      GH_TOKEN:
        description: 'The GitHub authentication token'
        required: true
      PUB_CREDENTIALS:
        description: 'Credentials for publishing to pub.dev'
        required: true
      CHOCOLATEY_TOKEN:
        description: 'Credentials for publishing to Chocolatey'
        required: true
permissions: {}

concurrency:
  group: ${{ github.workflow }}-release-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build_linux:
    permissions:
      id-token: write # Forwarded
      attestations: write # Forwarded
      artifact-metadata: write # Forwarded
    uses: ./.github/workflows/build-linux.yml

  build_macos:
    permissions:
      id-token: write # Forwarded
      attestations: write # Forwarded
      artifact-metadata: write # Forwarded
    uses: ./.github/workflows/build-macos.yml

  build_windows:
    permissions:
      id-token: write # Forwarded
      attestations: write # Forwarded
      artifact-metadata: write # Forwarded
    uses: ./.github/workflows/build-windows.yml

  release_github:
    name: Release Github
    runs-on: ubuntu-latest
    needs: [build_linux, build_macos, build_windows]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: {persist-credentials: false}
      - uses: ./.github/util/initialize
        with: {github-token: "${{ github.token }}"}

      - name: Deploy
        run: dart run grinder pkg-github-release
        env:
          GH_TOKEN: "${{ secrets.GH_TOKEN }}"
          GH_USER: sassbot

  deploy_github:
    name: Deploy Github
    runs-on: ubuntu-latest
    needs: [release_github]

    permissions:
      contents: write # Uploads release

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8

      - name: Release
        run: gh release upload "$GITHUB_REF_NAME" build-*/* --repo "$GITHUB_ACTION_REPOSITORY"

  deploy_npm:
    name: Deploy npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write # Authenticating npm trusted publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: {persist-credentials: false}
      - uses: ./.github/util/initialize
        with:
          github-token: ${{ github.token }}
          for-npm-deploy: true

      - name: Deploy
        run: dart run grinder pkg-npm-deploy
        env:
          UPDATE_SASS_SASS_REPO: false

  deploy_pub:
    name: Deploy Pub
    runs-on: ubuntu-latest

    permissions:
      contents: write # Pushes sass-api tag

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          # We have to use this rather than the implicit GitHub token so that
          # pushing a new tag triggers another action.
          token: ${{ secrets.GH_TOKEN }}
      - uses: ./.github/util/initialize
        with: {github-token: "${{ github.token }}"}

      - name: Deploy
        run: dart run grinder protobuf pkg-pub-deploy
        env: {PUB_CREDENTIALS: "${{ secrets.PUB_CREDENTIALS }}"}

      - name: Get Sass API version
        id: sass-api-version
        run: |
          echo "version=$(cat pkg/sass_api/pubspec.yaml | sed -nE 's/version: (.*)/\1/p')" | tee --append "$GITHUB_OUTPUT"
      # This should be /-separated rather than hyphenated, but pub.dev doesn't
      # currently allow that (dart-lang/pub-dev#8690).
      - run: git tag "sass-api-$VERSION"
        env:
          VERSION: ${{ steps.sass-api-version.outputs.version }}
      - run: git push --tag

  deploy_sass_types:
    name: Deploy @sass/types
    runs-on: ubuntu-latest

    permissions:
      id-token: write # npm trusted publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          token: ${{ secrets.GH_TOKEN }}
      # Set up .npmrc file to publish to npm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          check-latest: true
          registry-url: 'https://registry.npmjs.org'

      # npm trusted publisher infrastructure requires npm >=11.5.1
      - run: npm install -g npm@latest # zizmor: ignore[adhoc-packages]

      - name: Get Dart Sass version
        id: dart-sass-version
        run: echo "version=${GITHUB_REF_NAME}" | tee --append "$GITHUB_OUTPUT"
      - name: Check out the language repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: sass/sass
          path: build/language
      - name: Copy types from the language repo
        run: cp -r build/language/js-api-doc pkg/sass-types/types
      - name: Copy LICENSE file
        run: cp LICENSE pkg/sass-types/
      - name: Set the version of @sass/types
        run: npm pkg set "version=$VERSION"
        working-directory: pkg/sass-types/
        env:
          VERSION: ${{ steps.dart-sass-version.outputs.version }}
      - run: npm publish --provenance
        working-directory: pkg/sass-types/

  deploy_sass_parser:
    name: Deploy sass-parser
    runs-on: ubuntu-latest
    needs: [deploy_npm]

    permissions:
      id-token: write # npm trusted publishing

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          token: ${{ secrets.GH_TOKEN }}
      # Set up .npmrc file to publish to npm
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 'lts/*'
          check-latest: true
          registry-url: 'https://registry.npmjs.org'

      # The repo package has a file dependency, but the released version needs a
      # real dependency on the released version of Sass.
      - name: Get Dart Sass version
        id: dart-sass-version
        run: echo "version=${GITHUB_REF_NAME}" | tee --append "$GITHUB_OUTPUT"
      - run: npm install "sass@$VERSION" # zizmor: ignore[adhoc-packages]
        working-directory: pkg/sass-parser/
        env:
          VERSION: ${{ steps.dart-sass-version.outputs.version }}

      - run: npm run compile
        working-directory: pkg/sass-parser/
      - run: npm publish --provenance
        working-directory: pkg/sass-parser/

      - name: Get Sass parser version
        id: sass-parser-version
        run: |
          echo "version=$(jq .version pkg/sass-parser/package.json)" | tee --append "$GITHUB_OUTPUT"
      - run: git tag "sass-parser/$VERSION"
        env:
          VERSION: ${{ steps.sass-parser-version.outputs.version }}
      - run: git push --tag

  deploy_homebrew:
    name: Deploy Homebrew
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: {persist-credentials: false}
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1
      - run: dart pub get

      - name: Deploy
        run: dart run grinder pkg-homebrew-update
        env:
          GH_TOKEN: "${{ secrets.GH_TOKEN }}"
          GH_USER: sassbot

  deploy_chocolatey:
    name: Deploy Chocolatey
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with: {persist-credentials: false}
      - uses: ./.github/util/initialize
        with: {github-token: "${{ github.token }}"}

      - name: Deploy
        run: dart run grinder pkg-chocolatey-deploy
        env: {CHOCOLATEY_TOKEN: "${{ secrets.CHOCOLATEY_TOKEN }}"}

  deploy_website:
    name: Deploy sass-lang.com
    runs-on: ubuntu-latest
    needs: [deploy_npm]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: sass/sass-site
          token: ${{ secrets.SASS_SITE_TOKEN }}

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME}" | tee --append "$GITHUB_OUTPUT"

      - name: Wait for npm registry's CDN to catch up on replications
        run: sleep 600

      - name: Update Dart Sass version
        run: npm install "sass@$VERSION" # zizmor: ignore[adhoc-packages]
        env:
          VERSION: ${{ steps.version.outputs.version }}

      - run:
          git commit --all --allow-empty
            --author "Sass Bot <sass.bot.beep.boop@gmail.com>"
            --message "Cut a release for a new Dart Sass version"
      - run: git push

  release_embedded_host:
    name: Release Embedded Host
    runs-on: ubuntu-latest
    needs: [deploy_github]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          repository: sass/embedded-host-node
          token: ${{ secrets.GH_TOKEN }}

      - name: Get version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" | tee --append "$GITHUB_OUTPUT"
          echo "protocol_version=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" https://raw.githubusercontent.com/sass/sass/HEAD/spec/EMBEDDED_PROTOCOL_VERSION)" | tee --append "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Update version
        run: |
          # Update binary package versions
          for dir in $(ls npm); do
            cat "npm/$dir/package.json" |
                jq --arg version "$VERSION" '
                  .version |= $version |
                  if (.dependencies.sass) then .dependencies.sass |= $version end
                ' > package.json.tmp &&
              mv package.json.tmp "npm/$dir/package.json"
          done

          # Update main package version and dependencies on binary packages
          cat package.json |
              jq --arg version "$VERSION" --arg protocol_version "$PROTOCOL_VERSION" '
                .version |= $version |
                ."compiler-version" |= $version |
                ."protocol-version" |= $protocol_version |
                .optionalDependencies = (.optionalDependencies | .[] |= $version)
              ' > package.json.tmp &&
            mv package.json.tmp package.json
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" https://raw.githubusercontent.com/sass/dart-sass/$VERSION/CHANGELOG.md > CHANGELOG.md
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          PROTOCOL_VERSION: ${{ steps.version.outputs.protocol_version }}

      - run:
          git commit --all
            --author "Sass Bot <sass.bot.beep.boop@gmail.com>"
            --message "Update Dart Sass version and release"
      - run: git tag "$VERSION"
        env:
          VERSION: ${{ steps.version.outputs.version }}
      - run: git push
